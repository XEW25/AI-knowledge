<svg viewBox="0 0 680 296" xmlns="http://www.w3.org/2000/svg"><style>text{font-family:"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif}.t{fill:#2C2C2A}.ts{fill:#5F5E5A}.th{fill:#888780}.c-gray rect{fill:#F1EFE8}.c-gray .t{fill:#444441}.c-gray .ts{fill:#5F5E5A}.c-teal rect{fill:#E1F5EE}.c-teal .t{fill:#0F6E56}.c-teal .ts{fill:#1D9E75}.c-purple rect{fill:#EEEDFE}.c-purple .t{fill:#3C3489}.c-purple .ts{fill:#534AB7}.c-green rect{fill:#EAF3DE}.c-green .t{fill:#27500A}.c-green .ts{fill:#3B6D11}.c-amber rect{fill:#FAEEDA}.c-amber .t{fill:#854F0B}.c-amber .ts{fill:#BA7517}</style><rect width="680" height="296" fill="#FAF9F5"/>
  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <text x="24" y="22" class="t" font-size="15" font-weight="500">具身模型功能演进:以泛化为主线</text>
  <text x="24" y="40" class="ts" font-size="9">每阶段是对同一堵「泛化/可用性墙」的回应;主线 = 泛化的载体从「模型」走向「组合」。</text>

  <g class="c-gray"><rect x="24" y="50" width="146" height="118" rx="8"/><text class="t" x="97" y="68" font-size="10" font-weight="500" text-anchor="middle">① 端到端</text><text class="ts" x="32" y="88" font-size="8.5">功·单模型 感知→动作</text><text class="ts" x="32" y="108" font-size="8.5">泛·一个模型做大+堆数据</text><text class="ts" x="32" y="132" font-size="8.5">墙·OOD 崩;逐场景</text><text class="ts" x="32" y="145" font-size="8.5">RL+遥操才可用(线性)</text></g>
  <g class="c-teal"><rect x="190" y="50" width="146" height="118" rx="8"/><text class="t" x="263" y="68" font-size="10" font-weight="500" text-anchor="middle">② 大小脑协同</text><text class="ts" x="198" y="88" font-size="8.5">功·脑规划 + 小脑执行</text><text class="ts" x="198" y="108" font-size="8.5">泛·分层复用(脑 web 零样本)</text><text class="ts" x="198" y="132" font-size="8.5">墙·只解语义泛化;</text><text class="ts" x="198" y="145" font-size="8.5">小脑技能仍逐场景训</text></g>
  <g class="c-purple"><rect x="356" y="50" width="146" height="118" rx="8"/><text class="t" x="429" y="68" font-size="10" font-weight="500" text-anchor="middle">③ 端云自闭环</text><text class="ts" x="364" y="88" font-size="8.5">功·持续演进+车队共智</text><text class="ts" x="364" y="108" font-size="8.5">泛·逐场景适配→持续/共享</text><text class="ts" x="364" y="132" font-size="8.5">墙·仍"每场景再学一遍";</text><text class="ts" x="364" y="145" font-size="8.5">无结构复用</text></g>
  <g class="c-green"><rect x="522" y="50" width="146" height="118" rx="8"/><text class="t" x="595" y="68" font-size="10" font-weight="500" text-anchor="middle">④ 具身 Agentic</text><text class="ts" x="530" y="88" font-size="8.5">功·大脑编排技能库</text><text class="ts" x="530" y="108" font-size="8.5">泛·组合复用 + 重规划</text><text class="ts" x="530" y="132" font-size="8.5">解·新场景=技能新组合</text><text class="ts" x="530" y="145" font-size="8.5">+少量补训 → 亚线性</text></g>

  <line x1="24" y1="184" x2="668" y2="184" stroke="#888780" stroke-width="1.4" marker-end="url(#a)"/>
  <text x="24" y="180" class="th" font-size="8">泛化载体演进 →</text>
  <text x="97" y="198" class="ts" font-size="8.5" text-anchor="middle">模型 OOD 鲁棒</text>
  <text x="263" y="198" class="ts" font-size="8.5" text-anchor="middle">分层复用</text>
  <text x="429" y="198" class="ts" font-size="8.5" text-anchor="middle">持续/共享再学习</text>
  <text x="595" y="198" class="ts" font-size="8.5" text-anchor="middle">组合复用+重规划</text>

  <g class="c-amber"><rect x="24" y="212" width="644" height="26" rx="6"/><text class="t" x="32" y="229" font-size="9">适配成本:线性(逐场景 RL+遥操 → 不可持续) ——————————————→ 亚线性(技能复用)</text></g>
  <text x="24" y="258" class="ts" font-size="9">长程精度:p^N 指数衰减 × 缺 L3 任务纠错环 → Agentic 两把刀:拆短链 + 段间纠错。</text>
  <text x="24" y="282" class="th" font-size="8">例:①RT-2/π/G0.5 ②Helix S2+S1 / G0 / GO-1+BFM-2 ③端云 co-evolution 框架 ④Being-0 / MetaWorld-X / ChemBot + 本框架 L3。分析判断。</text>
</svg>