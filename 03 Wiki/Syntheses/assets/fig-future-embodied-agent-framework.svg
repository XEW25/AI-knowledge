<svg viewBox="0 0 700 392" xmlns="http://www.w3.org/2000/svg"><style>text{font-family:"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif}.t{fill:#2C2C2A}.ts{fill:#5F5E5A}.th{fill:#888780}.c-gray rect{fill:#F1EFE8}.c-gray .t{fill:#444441}.c-gray .ts{fill:#5F5E5A}.c-teal rect{fill:#E1F5EE}.c-teal .t{fill:#0F6E56}.c-teal .ts{fill:#1D9E75}.c-purple rect{fill:#EEEDFE}.c-purple .t{fill:#3C3489}.c-purple .ts{fill:#534AB7}.c-amber rect{fill:#FAEEDA}.c-amber .t{fill:#854F0B}.c-amber .ts{fill:#BA7517}</style>
<rect width="700" height="392" fill="#FAF9F5"/>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="24" y="24" class="t" font-size="15" font-weight="500">未来具身 Agent 框架:整合视图</text>
<text x="24" y="42" class="ts" font-size="9">分层具身 agent = 云端审议脑 ⟂ 端侧反应小脑;两条通道相连——运行时(计划/观测) + 演进(经验/技能)。由「泛化墙」驱动,终局是「组合可复用技能」。</text>

<text x="24" y="60" class="th" font-size="8.5">云端 · 慢脑 · 低频 · 可断网 —— 审议脑(propose-then-verify)</text>
<g class="c-purple">
<rect x="24" y="66" width="212" height="62" rx="8"/><text class="t" x="130" y="86" font-size="9.5" font-weight="500" text-anchor="middle">推理脑 (VLM/LLM) · 提案者</text><text class="ts" x="36" y="104" font-size="8">常识 / 意图 / 歧义消解</text><text class="ts" x="36" y="119" font-size="8">目标分解 · test-time compute</text>
<rect x="244" y="66" width="212" height="62" rx="8"/><text class="t" x="350" y="86" font-size="9.5" font-weight="500" text-anchor="middle">世界模型 · 验证者</text><text class="ts" x="256" y="104" font-size="8">结果预测 / 空间推理</text><text class="ts" x="256" y="119" font-size="8">行动前验证 (propose→verify)</text>
<rect x="464" y="66" width="212" height="62" rx="8"/><text class="t" x="570" y="86" font-size="9.5" font-weight="500" text-anchor="middle">记忆 (显式)</text><text class="ts" x="476" y="104" font-size="8">语义 / 知识 / episodic</text><text class="ts" x="476" y="119" font-size="8">个人记忆加密或留端</text>
</g>

<line x1="350" y1="130" x2="350" y2="222" stroke="#B4B2AA" stroke-width="1.4" marker-start="url(#a)" marker-end="url(#a)"/>
<g class="c-gray">
<rect x="96" y="146" width="214" height="46" rx="8"/><text class="t" x="203" y="164" font-size="9" font-weight="500" text-anchor="middle">运行时通道 · 计划级接口</text><text class="ts" x="203" y="181" font-size="8" text-anchor="middle">↓ 计划 / 子目标    ↑ 观测(低频)</text>
<rect x="390" y="146" width="224" height="46" rx="8"/><text class="t" x="502" y="164" font-size="9" font-weight="500" text-anchor="middle">演进通道 · 端云 co-evolution</text><text class="ts" x="502" y="181" font-size="8" text-anchor="middle">↑ 经验/接管/缺口   ↓ 新专家/能力画像</text>
</g>

<text x="24" y="216" class="th" font-size="8.5">端侧 · 快小脑 · 高频 · 必须离线可用 —— 反应执行 + 安全</text>
<g class="c-teal">
<rect x="24" y="222" width="157" height="64" rx="8"/><text class="t" x="102" y="241" font-size="9" font-weight="500" text-anchor="middle">专家技能库 · L3</text><text class="ts" x="34" y="259" font-size="8">短 · 高-p 技能</text><text class="ts" x="34" y="275" font-size="8">段间检测/重规划/恢复</text>
<rect x="189" y="222" width="157" height="64" rx="8"/><text class="t" x="267" y="241" font-size="9" font-weight="500" text-anchor="middle">安全脊髓</text><text class="ts" x="199" y="259" font-size="8">CBF / shield 过滤</text><text class="ts" x="199" y="275" font-size="8">实时 · 断网也工作</text>
<rect x="354" y="222" width="157" height="64" rx="8"/><text class="t" x="432" y="241" font-size="9" font-weight="500" text-anchor="middle">程序性技能</text><text class="ts" x="364" y="259" font-size="8">高频流程固化</text><text class="ts" x="364" y="275" font-size="8">≈ 生物小脑(隐式记忆)</text>
<rect x="519" y="222" width="157" height="64" rx="8"/><text class="t" x="597" y="241" font-size="9" font-weight="500" text-anchor="middle">蒸馏小脑 + 轻推理</text><text class="ts" x="529" y="259" font-size="8">断网退化-通用能力</text><text class="ts" x="529" y="275" font-size="8">本地自治兜底</text>
</g>

<g class="c-amber"><rect x="24" y="300" width="652" height="30" rx="6"/><text class="t" x="36" y="319" font-size="8.5">地基 · capability(堆规模=平均能做多少)  ⟂  dependability(部署闸门:自知会错 / 能恢复 / 不闯祸 / 换场景成本)</text></g>
<text x="24" y="352" class="ts" font-size="8.5">四约束:智能在云 · 身体在端 · 安全必须在端 · 断网必须能活。</text>
<text x="24" y="372" class="th" font-size="8">前瞻综合(Ethan+Ada):模型锚点(π / GR00T / GO-1 / Helix / ChemBot)已核实;分层形态 · 两通道 · 亚线性主线 = 分析判断。</text>
</svg>
