  <line x1="192" y1="315" x2="250" y2="292" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="214" y="320" class="th" font-size="10">安全动作</text>
  <line x1="402" y1="280" x2="468" y2="280" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#a)"/>
